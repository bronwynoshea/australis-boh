  <circle cx="388" cy="464" r="68" fill="#18b9a7"/>
  <text x="388" y="470" text-anchor="middle" class="circle-label">Operations</text>
  <text x="390" y="567" text-anchor="middle" class="label">Enable what we sell</text>
  <path d="M212 361 H260 V561 H212" class="operations"/>
  <path d="M212 411 H260" class="operations"/>
