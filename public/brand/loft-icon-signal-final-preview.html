<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loft Signal Icon Final</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef2fb;
        color: #10163a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background: #eef2fb;
      }

      main {
        width: min(980px, 100%);
      }

      h1 {
        margin: 0 0 24px;
        font-size: clamp(32px, 5vw, 58px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .card {
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(16, 22, 58, 0.1);
        border-radius: 28px;
        padding: 20px;
        box-shadow: 0 24px 70px rgba(16, 22, 58, 0.1);
      }

      .stage {
        display: grid;
        place-items: center;
        min-height: 320px;
        border-radius: 22px;
        border: 1px solid rgba(16, 22, 58, 0.08);
      }

      .light {
        background: #f7f9ff;
      }

      .dark {
        background: #10163a;
      }

      img {
        width: min(220px, 72%);
        height: auto;
      }

      h2 {
        margin: 16px 0 0;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .small-row {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      .small-row span {
        display: grid;
        place-items: center;
        width: 56px;
        height: 56px;
        border-radius: 16px;
        border: 1px solid rgba(16, 22, 58, 0.08);
        background: #f7f9ff;
      }

      .small-row span.dark-chip {
        background: #10163a;
      }

      .small-row img {
        width: 32px;
      }

      .small-row img.tiny {
        width: 24px;
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Final Signal Icon</h1>
      <section class="grid">
        <article class="card">
          <div class="stage light">
            <img src="./loft-icon-signal-final-light.svg" alt="Final Signal icon light mode" />
          </div>
          <h2>Light mode</h2>
          <div class="small-row">
            <span><img src="./loft-icon-signal-final-light.svg" alt="" /></span>
            <span><img class="tiny" src="./loft-icon-signal-final-light.svg" alt="" /></span>
          </div>
        </article>

        <article class="card">
          <div class="stage dark">
            <img src="./loft-icon-signal-final-dark.svg" alt="Final Signal icon dark mode" />
          </div>
          <h2>Dark mode</h2>
          <div class="small-row">
            <span class="dark-chip"><img src="./loft-icon-signal-final-dark.svg" alt="" /></span>
            <span class="dark-chip"><img class="tiny" src="./loft-icon-signal-final-dark.svg" alt="" /></span>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
