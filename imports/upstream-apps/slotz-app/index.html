<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLOTZ | Professional Scheduling</title>
    <style>
        /* Hide scrollbars globally while preserving functionality */
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        *::-webkit-scrollbar {
            display: none;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Inter', 'sans-serif';
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        #root {
            min-height: 100%;
        }

        .perspective-lg {
            perspective: 1000px;
        }
        
        .angled-card {
            transform: rotateX(10deg) rotateY(-18deg) rotateZ(6deg);
            box-shadow: 20px 20px 60px rgba(0,0,0,0.3), -5px -5px 20px rgba(255,255,255,0.05);
        }

        /* Prevent zoom on input focus on iOS */
        input, textarea, select {
            font-size: 16px !important;
        }
    </style>
