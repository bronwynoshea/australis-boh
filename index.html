<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link id="app-favicon" rel="icon" type="image/png" href="/Assets/australis-logo-mark.png" />
    <title>Australis - Back of House</title>
    <meta name="description" content="Australis Back of House business operations." />
    <meta property="og:title" content="Australis - Back of House" />
    <meta property="og:description" content="Australis Back of House business operations." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Australis - Back of House" />
    <meta name="twitter:description" content="Australis Back of House business operations." />
    <script>
        (() => {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            const isSlotz = hostname === 'slotz.boh.australis.cloud' || pathname.startsWith('/slotz/');
            const isLoft = hostname === 'loft.boh.australis.cloud' || pathname.includes('/loft/');
            const metadata = isLoft
                ? {
                    title: 'LOFT private table',
                    description: 'Join a private LOFT table.',
                    favicon: '/brand/loft-icon-signal-final-light.svg',
                }
                : isSlotz
                    ? {
                        title: 'SLOTZ booking',
                        description: 'Book a SLOTZ calendar session.',
                        favicon: '/Assets/australis-logo-mark.png',
                    }
                    : {
                        title: 'Australis - Back of House',
                        description: 'Australis Back of House business operations.',
                        favicon: '/Assets/australis-logo-mark.png',
                    };

            document.title = metadata.title;
            document.querySelector('meta[name="description"]')?.setAttribute('content', metadata.description);
            document.querySelector('meta[property="og:title"]')?.setAttribute('content', metadata.title);
            document.querySelector('meta[property="og:description"]')?.setAttribute('content', metadata.description);
            document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', metadata.title);
            document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', metadata.description);
            const favicon = document.querySelector('#app-favicon');
            favicon?.setAttribute('href', metadata.favicon);
            favicon?.setAttribute('type', metadata.favicon.endsWith('.svg') ? 'image/svg+xml' : 'image/png');
        })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
