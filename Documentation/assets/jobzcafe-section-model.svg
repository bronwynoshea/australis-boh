  <circle cx="945" cy="513" r="5" fill="#99002f"/>
  <circle cx="945" cy="564" r="5" fill="#99002f"/>
  <text x="970" y="368" class="label">Sales</text>
  <text x="970" y="418" class="label">Marketing</text>
  <text x="970" y="469" class="label">Partnerships</text>
  <text x="970" y="518" class="label">Customer Revenue</text>
  <text x="970" y="569" class="label">Revenue Intelligence</text>

  <!-- Footnote -->
  <text x="575" y="626" text-anchor="middle" class="footnote">Large Circles (Sections) - Core business function, led by a Section Lead (C-Level)</text>
  <text x="575" y="641" text-anchor="middle" class="footnote">Branches (Tables) - Functional areas within a section, led by a Table Lead</text>
</svg>
