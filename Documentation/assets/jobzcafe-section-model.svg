  <circle cx="929" cy="92" r="5" fill="#4096f5"/>
  <circle cx="929" cy="143" r="5" fill="#4096f5"/>
  <circle cx="929" cy="193" r="5" fill="#4096f5"/>
  <circle cx="929" cy="243" r="5" fill="#4096f5"/>
  <text x="947" y="46" class="label">Research &amp; Design</text>
  <text x="947" y="97" class="label">Core Platform</text>
  <text x="947" y="148" class="label">AI / DNA Engine</text>
  <text x="947" y="198" class="label">Infrastructure</text>
  <text x="947" y="248" class="label">Product Intelligence</text>

