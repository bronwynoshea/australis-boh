  <circle cx="212" cy="461" r="5" fill="#18b9a7"/>
  <circle cx="212" cy="512" r="5" fill="#18b9a7"/>
  <circle cx="212" cy="561" r="5" fill="#18b9a7"/>
  <text x="198" y="366" text-anchor="end" class="label">Finance</text>
  <text x="198" y="416" text-anchor="end" class="label">Legal &amp; Risk</text>
  <text x="198" y="466" text-anchor="end" class="label">People &amp; Culture</text>
  <text x="198" y="517" text-anchor="end" class="label">Customer Success</text>
  <text x="198" y="566" text-anchor="end" class="label">Operations Intelligence</text>

  <!-- Commercial -->
  <circle cx="770" cy="464" r="68" fill="#99002f"/>
  <text x="770" y="470" text-anchor="middle" class="circle-label">Commercial</text>
  <text x="771" y="557" text-anchor="middle" class="label">Grow what we sell</text>
  <path d="M838 464 H900 V363 H945" class="commercial"/>
  <path d="M900 413 H945" class="commercial"/>
  <path d="M900 464 H945" class="commercial"/>
  <path d="M900 513 H945" class="commercial"/>
  <path d="M900 564 H945" class="commercial"/>
  <circle cx="945" cy="363" r="5" fill="#99002f"/>
